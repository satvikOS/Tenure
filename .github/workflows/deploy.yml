name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress deploy

jobs:
  # ── Guard: only deploy if CI passes ─────────────────────────────────────────
  ci-check:
    name: CI must pass first
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to AWS
    needs: ci-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For OIDC (add when migrating from static keys)

    env:
      AWS_REGION:      ${{ secrets.AWS_REGION || 'us-east-1' }}
      TF_DIR:          infrastructure/terraform
      IMAGE_TAG:       sha-${{ github.sha }}

    outputs:
      cloudfront_url: ${{ steps.get-url.outputs.url }}

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS credentials ───────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Bootstrap Terraform state backend ─────────────────────────────
      - name: Bootstrap Terraform state backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="tenure-tfstate-${ACCOUNT_ID}-${AWS_REGION}"
          LOCK_TABLE="tenure-terraform-locks"

          echo "STATE_BUCKET=$STATE_BUCKET"   >> $GITHUB_ENV
          echo "ACCOUNT_ID=$ACCOUNT_ID"       >> $GITHUB_ENV

          # Create S3 state bucket (idempotent)
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION" \
              $( [ "$AWS_REGION" != "us-east-1" ] && echo "--create-bucket-configuration LocationConstraint=$AWS_REGION" )
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "✅ Created state bucket: $STATE_BUCKET"
          else
            echo "✅ State bucket exists: $STATE_BUCKET"
          fi

          # Create DynamoDB lock table (idempotent)
          if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" 2>/dev/null; then
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            echo "✅ Created lock table: $LOCK_TABLE"
          else
            echo "✅ Lock table exists: $LOCK_TABLE"
          fi

      # ── 4. Terraform: provision ECR first (needed before Docker push) ────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=$STATE_BUCKET" \
            -backend-config="key=pilot/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=tenure-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform apply — ECR only (needed before image push)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -target=aws_ecr_repository.app \
            -var="image_tag=$IMAGE_TAG" \
            -auto-approve -input=false
          ECR_URL=$(terraform output -raw ecr_repository_url)
          echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV

      # ── 5. Build and push Docker image ───────────────────────────────────
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_URL }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_URL }}:latest
          cache-from: type=registry,ref=${{ env.ECR_URL }}:latest
          cache-to:   type=inline
          provenance: false

      # ── 6. Terraform: full infrastructure apply ──────────────────────────
      - name: Terraform apply — full infrastructure
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -var="image_tag=$IMAGE_TAG" \
            -auto-approve -input=false

      # ── 7. Force ECS to pull the new image ──────────────────────────────
      - name: Register new ECS task definition and deploy
        run: |
          CLUSTER=$(cd $TF_DIR && terraform output -raw ecs_cluster_name)
          SERVICE=$(cd $TF_DIR && terraform output -raw ecs_service_name)

          # Get the current task definition and update the image tag
          TASK_DEF=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query "services[0].taskDefinition" --output text)

          # Update ECS service to force new deployment with the latest task definition
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service  "$SERVICE" \
            --force-new-deployment \
            --query "service.serviceArn" --output text

          echo "ECS_CLUSTER=$CLUSTER" >> $GITHUB_ENV
          echo "ECS_SERVICE=$SERVICE" >> $GITHUB_ENV

      # ── 8. Wait for tasks to be healthy (max 10 min) ─────────────────────
      - name: Wait for ECS service to stabilize
        run: |
          echo "⏳ Waiting for ECS tasks to be healthy..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "✅ ECS service is stable"

      # ── 9. Get and output the working URL ────────────────────────────────
      - name: Get CloudFront URL
        id: get-url
        working-directory: ${{ env.TF_DIR }}
        run: |
          CF_URL=$(terraform output -raw cloudfront_url)
          echo "url=$CF_URL" >> $GITHUB_OUTPUT
          echo "CF_URL=$CF_URL" >> $GITHUB_ENV

      - name: Output deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **🌐 Frontend URL** | $CF_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| **📦 Image tag** | \`$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **🔖 Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **👤 Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure endpoints" >> $GITHUB_STEP_SUMMARY
          echo "Sensitive endpoints (RDS, Redis) are in AWS Secrets Manager. Check CloudWatch dashboard for metrics." >> $GITHUB_STEP_SUMMARY
