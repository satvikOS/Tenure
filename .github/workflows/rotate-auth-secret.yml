name: Rotate Auth Secret

# One-off/manual: replaces AUTH_SECRET in Secrets Manager with a fresh
# 512-bit random value and bounces ECS so tasks pick it up. All active
# sessions are invalidated — users simply sign in again.
on: workflow_dispatch

jobs:
  rotate:
    name: Rotate AUTH_SECRET
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.ACCESSKEYID }}
          aws-secret-access-key: ${{ secrets.SECRETACCESSKEY }}
          aws-region:            ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Rotate secret and redeploy
        run: |
          SECRET_ID="tenure-pilot/app"
          NEW=$(openssl rand -base64 64 | tr -d '\n')

          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ID" --query SecretString --output text)
          UPDATED=$(echo "$CURRENT" | jq --arg v "$NEW" '.AUTH_SECRET = $v')

          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ID" --secret-string "$UPDATED" >/dev/null
          echo "✅ AUTH_SECRET rotated"

          aws ecs update-service --cluster tenure-pilot \
            --service tenure-pilot-app --force-new-deployment \
            --query 'service.serviceArn' --output text
          # Rollover can exceed the waiter's 10-min window — allow 20
          aws ecs wait services-stable --cluster tenure-pilot --services tenure-pilot-app || \
          aws ecs wait services-stable --cluster tenure-pilot --services tenure-pilot-app
          echo "✅ ECS redeployed with the new secret"
