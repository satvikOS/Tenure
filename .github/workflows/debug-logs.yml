name: Debug Logs

# Manual utility: dump recent ECS stopped-task reasons and app logs
# so container startup failures can be diagnosed from the Actions UI.
on: workflow_dispatch

jobs:
  logs:
    name: Dump ECS + app logs
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.ACCESSKEYID }}
          aws-secret-access-key: ${{ secrets.SECRETACCESSKEY }}
          aws-region:            ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Stopped task reasons
        run: |
          TASKS=$(aws ecs list-tasks --cluster tenure-pilot \
            --desired-status STOPPED --query 'taskArns[:5]' --output text)
          if [ -n "$TASKS" ]; then
            aws ecs describe-tasks --cluster tenure-pilot --tasks $TASKS \
              --query 'tasks[].{stopped:stoppedAt,reason:stoppedReason,exit:containers[0].exitCode,creason:containers[0].reason,image:containers[0].image}' \
              --output table
          else
            echo "No stopped tasks"
          fi

      - name: Recent app logs
        run: |
          aws logs tail /ecs/tenure-pilot --since 60m --format short | tail -150 || echo "no logs"
